@if (isLoading) {
  <div class="d-flex justify-content-center align-items-center" style="height: 100%">
    <mat-spinner></mat-spinner>
  </div>
} @else {

  @if (!sdadTree[0].expandable) {
    <ngb-alert type="info" [dismissible]="false">
      Δεν υπάρχουν μονάδες στο φορέα.
    </ngb-alert>
  } @else {

    <cdk-tree [dataSource]="dataSource" [treeControl]="treeControl">

      <!-- Leaf -->
      <cdk-tree-node *cdkTreeNodeDef="let node" cdkTreeNodePadding [style.display]="shouldRender(node) ? 'flex' : 'none'"
        class="tree-node">

        <button mat-icon-button disabled></button>

        <span 
          role="button" 
          (click)="showOrganizationUnitDetails(node.code)" 
          ngbTooltip="Κωδικός απογραφής: {{ node.code }}"
          placement="end"
          class="text-truncate">
          {{ node.preferredLabel }}
        </span>

        @if(user() && canEdit(node.code)){
        <span class="ms-2" ngbTooltip="Εισαγωγή Διατάξεων Πρόβλεψης">
          <i class="bi bi-pencil-square" role="button" (click)="editMonada(node.code)"></i>
        </span>
        }
      </cdk-tree-node>

      <!-- Expandable -->
      <cdk-tree-node *cdkTreeNodeDef="let node; when: hasChild" cdkTreeNodePadding
        [style.display]="shouldRender(node) ? 'flex' : 'none'" class="tree-node">

        <button mat-icon-button cdkTreeNodeToggle (click)="node.isExpanded = !node.isExpanded">
          <mat-icon>
            {{ treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right' }}
          </mat-icon>
        </button>

        @if (node.level>=1) {
          <span 
            role="button" 
            (click)="showOrganizationUnitDetails(node.code)" 
            ngbTooltip="Κωδικός απογραφής: {{ node.code }}"
            placement="end" 
            class="text-truncate">
            {{ node.preferredLabel }}
          </span>
        } @else {
          <span 
            ngbTooltip="Κωδικός απογραφής: {{ node.code }}"
            placement="end" 
            class="text-truncate">
            {{ node.preferredLabel }}
          </span>
        }

        @if(user() && canEdit(node.code)){
        <span class="ms-2" ngbTooltip="Εισαγωγή Διατάξεων Πρόβλεψης">
          <i class="bi bi-pencil-square" role="button" (click)="editMonada(node.code)"></i>
        </span>
        }
      </cdk-tree-node>

    </cdk-tree>

  }
}
